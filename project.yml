name: Snapper
options:
  minimumXcodeGenVersion: 2.37.0
settings:
  base:
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: 13.0
    CODE_SIGN_STYLE: Automatic
targets:
  Snapper:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Snapper
        excludes:
          - Resources/Assets.xcassets
    resources:
      - path: Snapper/Resources/Assets.xcassets
    info:
      path: Snapper/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "13.0"
        NSAccessibilityUsageDescription: Snapper needs Accessibility access to move and resize windows.
    entitlements:
      path: Snapper/Snapper.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapper.app
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Snapper/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        ENABLE_APP_SANDBOX: NO
    dependencies:
      - sdk: Carbon.framework
      - sdk: ServiceManagement.framework
      - sdk: ApplicationServices.framework
  SnapperTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: SnapperTests
    dependencies:
      - target: Snapper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.snapper.app.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Snapper:
    build:
      targets:
        Snapper: all
        SnapperTests: [test]
    test:
      targets:
        - SnapperTests
